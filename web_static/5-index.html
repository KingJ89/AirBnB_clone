<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Header, Footer, and Filters</title>
    <link rel="stylesheet" href="styles/4-common.css">
    <link rel="stylesheet" href="styles/3-header.css">
    <link rel="stylesheet" href="styles/3-footer.css">
    <link rel="stylesheet" href="styles/5-filters.css">
    <link rel="icon" type="image/png" href="images/favicon.png">
</head>
<body>

        <img src="images/icon.png" alt="Logo" class="logo">
    </header>
    
    <div class="container">
        <section class="filters">
            <div class="locations">
                <h3>States</h3>

                <h3>Amenities</h3>

            <button>Search</button>
        </section>
    </div>
    
    <footer>
        <span>Best School</span>
    </footer>
</body>
</html>
